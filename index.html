<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythos</title>
    <link rel="stylesheet" href="style.css" />

    <script src="script.js" defer></script>

    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
  </head>
  <body>
    <a href="#main" class="visually-hidden skip">Skip to main content</a>

    <header class="topnav">
      <h2 class="visually-hidden">Header</h2>

      <div class="wrapper topnav__wrapper">
        <a href="/" class="topnav__homelink">
          <img
            src="img/logo-mythos.svg"
            alt="Mythos homepage"
            class="topnav__logo"
            width="128"
            height="36"
          />
        </a>

        <nav>
          <ul class="topnav__links">
            <li class="topnav__item">
              <a href="" class="topnav__link">Features</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">Pricing</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">About</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="main">
      <div class="wrapper main__wrapper">
        <img
          src="img/unicorn.svg"
          alt="unicorn"
          class="main__img"
          width="200"
          height="205"
        />
        <div class="main__content">
          <h1 class="main__heading">Find that elusive unicorn.</h1>
          <p class="main__paragraph">
            Mythos will enable you to discover the newest startups to invest in.
            Powered by AI, used by millions of humans.
          </p>
          <button class="main__btn_primary">
            <a href="" class="main__btn_primary_link">Free Trial</a>
          </button>
          <button class="main__btn_secondary">
            <a href="" class="main__btn_secondary_link">Pricing</a>
          </button>
        </div>
      </div>
    </main>

    <footer>
      <h2 class="visually-hidden">Footer</h2>
    </footer>
  </body>
</html>
